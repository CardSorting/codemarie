// --- MCP Messages ---

message ToggleMcpServerRequest {
  Metadata metadata = 1;
  string server_name = 2;
  bool disabled = 3;
}

message UpdateMcpTimeoutRequest {
  Metadata metadata = 1;
  string server_name = 2;
  int32 timeout = 3;
}

message AddRemoteMcpServerRequest {
  Metadata metadata = 1;
  string server_name = 2;
  string server_url = 3;
  optional string transport_type = 4;
}

message ToggleToolAutoApproveRequest {
  Metadata metadata = 1;
  string server_name = 2;
  repeated string tool_names = 3;
  bool auto_approve = 4;
}

message McpTool {
  string name = 1;
  optional string description = 2;
  optional string input_schema = 3;
  optional bool auto_approve = 4;
}

message McpResource {
  string uri = 1;
  string name = 2;
  optional string mime_type = 3;
  optional string description = 4;
}

message McpResourceTemplate {
  string uri_template = 1;
  string name = 2;
  optional string mime_type = 3;
  optional string description = 4;
}

message McpPromptArgument {
  string name = 1;
  optional string description = 2;
  optional bool required = 3;
}

message McpPrompt {
  string name = 1;
  optional string title = 2;
  optional string description = 3;
  repeated McpPromptArgument arguments = 4;
}

