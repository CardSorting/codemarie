syntax = "proto3";

package codemarie;

import "codemarie/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";


// SystemService provides methods for host-related operations
// including browser management, web metadata, system-level slash commands,
// model management, MCP servers, and UI interactions.
service SystemService {
  // --- Browser operations ---
  rpc getBrowserConnectionInfo(EmptyRequest) returns (BrowserConnectionInfo);
  rpc testBrowserConnection(StringRequest) returns (BrowserConnection);
  rpc discoverBrowser(EmptyRequest) returns (BrowserConnection);
  rpc getDetectedChromePath(EmptyRequest) returns (ChromePath);
  rpc relaunchChromeDebugMode(EmptyRequest) returns (String);

  // --- Web operations ---
  rpc checkIsImageUrl(StringRequest) returns (IsImageUrl);
  rpc fetchOpenGraphData(StringRequest) returns (OpenGraphData);
  rpc openInBrowser(StringRequest) returns (Empty);
  rpc openUrl(StringRequest) returns (Empty);

  // --- Slash commands ---
  rpc getAvailableSlashCommands(EmptyRequest) returns (SlashCommandsResponse);

  // --- Commands ---
  rpc addToCodemarie(CommandContext) returns (Empty);
  rpc fixWithCodemarie(CommandContext) returns (Empty);
  rpc explainWithCodemarie(CommandContext) returns (Empty);
  rpc improveWithCodemarie(CommandContext) returns (Empty);

  // --- Checkpoints ---
  rpc checkpointDiff(Int64Request) returns (Empty);
  rpc checkpointRestore(CheckpointRestoreRequest) returns (Empty);
  rpc subscribeToCheckpoints(CheckpointSubscriptionRequest) returns (stream CheckpointEvent);
  rpc getCwdHash(StringArrayRequest) returns (PathHashMap);

  // --- Models ---
  rpc refreshModels(RefreshModelsRequest) returns (RefreshModelsResponse);
  rpc subscribeToOpenRouterModels(EmptyRequest) returns (stream OpenRouterCompatibleModelInfo);
  rpc subscribeToLiteLlmModels(EmptyRequest) returns (stream OpenRouterCompatibleModelInfo);
  rpc updateApiConfiguration(UpdateApiConfigurationRequestNew) returns (Empty);
  rpc updateApiConfigurationPartial(UpdateApiConfigurationPartialRequest) returns (Empty);

  // --- MCP ---
  rpc toggleMcpServer(ToggleMcpServerRequest) returns (McpServers);
  rpc updateMcpTimeout(UpdateMcpTimeoutRequest) returns (McpServers);
  rpc addRemoteMcpServer(AddRemoteMcpServerRequest) returns (McpServers);
  rpc downloadMcp(StringRequest) returns (McpDownloadResponse);
  rpc restartMcpServer(StringRequest) returns (McpServers);
  rpc deleteMcpServer(StringRequest) returns (McpServers);
  rpc toggleToolAutoApprove(ToggleToolAutoApproveRequest) returns (McpServers);
  rpc refreshMcpMarketplace(EmptyRequest) returns (McpMarketplaceCatalog);
  rpc openMcpSettings(EmptyRequest) returns (Empty);
  rpc authenticateMcpServer(StringRequest) returns (Empty);
  rpc subscribeToMcpMarketplaceCatalog(EmptyRequest) returns (stream McpMarketplaceCatalog);
  rpc getLatestMcpServers(Empty) returns (McpServers);
  rpc subscribeToMcpServers(EmptyRequest) returns (stream McpServers);

  // --- UI ---
  rpc scrollToSettings(StringRequest) returns (KeyValuePair);
  rpc setTerminalExecutionMode(BooleanRequest) returns (KeyValuePair);
  rpc onDidShowAnnouncement(EmptyRequest) returns (Boolean);
  rpc subscribeToUiEvents(EmptyRequest) returns (stream UiEvent);
  rpc subscribeToAddToInput(EmptyRequest) returns (stream String);
  rpc subscribeToPartialMessage(EmptyRequest) returns (stream CodemarieMessage);
  rpc initializeWebview(EmptyRequest) returns (Empty);
  rpc subscribeToShowWebview(EmptyRequest) returns (stream ShowWebviewEvent);
  rpc getWebviewHtml(EmptyRequest) returns (String);
  rpc openWalkthrough(EmptyRequest) returns (Empty);

  // --- Unified System Stream ---
  rpc subscribeToSystemUpdates(EmptyRequest) returns (stream SystemUpdate);
}

// --- Unified System Update ---

message SystemUpdate {
  oneof update {
    StateUpdate state = 1;
    UiEvent ui_event = 2;
    McpServers mcp_servers = 3;
    McpMarketplaceCatalog mcp_marketplace = 4;
    OpenRouterCompatibleModelInfo open_router_models = 5;
    OpenRouterCompatibleModelInfo lite_llm_models = 6;
    CodemarieMessage partial_message = 7;
    CheckpointEvent checkpoint_event = 8;
  }
}

message StateUpdate {
  string state_json = 1;
  map<string, string> partial_updates = 2;
}

// --- Browser Messages ---

message BrowserConnectionInfo {
  bool is_connected = 1;
  bool is_remote = 2;
  optional string host = 3;
}

message BrowserConnection {
  bool success = 1;
  string message = 2;
  optional string endpoint = 3;
}

message ChromePath {
  string path = 1;
  bool is_bundled = 2;
}

message IsImageUrl {
  bool is_image = 1;
  string url = 2;
}

message OpenGraphData {
  string title = 1;
  string description = 2;
  string image = 3;
  string url = 4;
  string site_name = 5;
  string type = 6;
}

// --- Slash Command Messages ---

message SlashCommandInfo {
  string name = 1;
  string description = 2;
  string section = 3;
  bool cli_compatible = 4;
}

message SlashCommandsResponse {
  repeated SlashCommandInfo commands = 1;
}

message Viewport {
  int32 width = 1;
  int32 height = 2;
}

// --- Commands Messages ---

message CommandContext {
  optional string file_path = 1;
  optional string selected_text = 2;
  optional string language = 3;
  repeated codemarie.Diagnostic diagnostics = 4;
}

// --- Checkpoints Messages ---

message CheckpointRestoreRequest {
  Metadata metadata = 1;
  int64 number = 2;
  string restore_type = 3;
  optional int64 offset = 4;
}

message CheckpointSubscriptionRequest {
  string cwd_hash = 1;
}

message CheckpointEvent {
  enum OperationType {
    CHECKPOINT_INIT = 0;
    CHECKPOINT_COMMIT = 1;
    CHECKPOINT_RESTORE = 2;
  }
  OperationType operation = 1;
  string cwd_hash = 2;
  bool is_active = 3;
  google.protobuf.Timestamp timestamp = 4;
  optional string task_id = 5;
  optional string commit_hash = 6;
}

message PathHashMap {
  map<string, string> path_hash = 1;
}

message BrowserSettings {
  Viewport viewport = 1;
  optional string remote_browser_host = 2;
  optional bool remote_browser_enabled = 3;
  optional string chrome_executable_path = 4;
  optional bool disable_tool_use = 5;
  optional string custom_args = 6;
}

// --- Models Messages ---

message RefreshModelsRequest {
  ApiProvider provider = 1;
  optional string base_url = 2;
  optional string api_key = 3;
  optional string resource_group = 4;
  optional string token_url = 5;
  optional string client_id = 6;
  optional string client_secret = 7;
}

message SapAiCoreModelsRequest {
  Metadata metadata = 1;
  string client_id = 2;
  string client_secret = 3;
  string token_url = 4;
  string base_url = 5;
  string resource_group = 6;
}

message RefreshModelsResponse {
  oneof result {
    OpenRouterCompatibleModelInfo compatible_models = 1;
    StringArray string_array_models = 3;
    VsCodeLmModelsArray vs_code_lm_models = 4;
    SapAiCoreModelsResponse sap_ai_core_models = 5;
    OcaCompatibleModelInfo oca_models = 6;
  }
}

message VsCodeLmModelsArray {
  repeated LanguageModelChatSelector models = 1;
}

message LanguageModelChatSelector {
  optional string vendor = 1;
  optional string family = 2;
  optional string version = 3;
  optional string id = 4;
}

message PriceTier {
  int64 token_limit = 1;
  double price = 2;
}

message ThinkingConfig {
  optional int64 max_budget = 1;
  optional double output_price = 2;
  repeated PriceTier output_price_tiers = 3;
}

message ModelTier {
  int64 context_window = 1;
  optional double input_price = 2;
  optional double output_price = 3;
  optional double cache_writes_price = 4;
  optional double cache_reads_price = 5;
}

message OpenRouterModelInfo {
  optional int64 max_tokens = 1;
  optional int64 context_window = 2;
  optional bool supports_images = 3;
  bool supports_prompt_cache = 4;
  optional double input_price = 5;
  optional double output_price = 6;
  optional double cache_writes_price = 7;
  optional double cache_reads_price = 8;
  optional string description = 9;
  optional ThinkingConfig thinking_config = 10;
  optional bool supports_global_endpoint = 11;
  repeated ModelTier tiers = 12;
  optional string name = 13;
  optional double temperature = 14;
  optional bool supports_reasoning = 15;
  optional ApiFormat api_format = 16;
}

message OpenRouterCompatibleModelInfo {
  map<string, OpenRouterModelInfo> models = 1;
}


message SapAiCoreModelDeployment {
  string model_name = 1;
  string deployment_id = 2;
}

message SapAiCoreModelsResponse {
  repeated SapAiCoreModelDeployment deployments = 1;
  bool orchestration_available = 2;
