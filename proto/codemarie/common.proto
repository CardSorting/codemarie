syntax = "proto3";

package codemarie;


message Metadata {}

message EmptyRequest {}

message Empty {}

message StringRequest {
  string value = 2;
}

message StringArrayRequest {
  repeated string value = 2;
}

message String {
  string value = 1;
}

message Int64Request {
  int64 value = 2;
}

message Int64 {
  int64 value = 1;
}

message BytesRequest {
  bytes value = 2;
}

message Bytes {
  bytes value = 1;
}

message BooleanRequest {
  bool value = 2;
}

message Boolean {
  bool value = 1;
}

// the same as Boolean, but avoiding name conflicts
message BooleanResponse {
  bool value = 1;
}

message StringArray {
  repeated string values = 1;
}

message StringArrays {
  repeated string values1 = 1;
  repeated string values2 = 2;
}

message KeyValuePair {
  string key = 1;
  string value = 2;
}

message FileDiagnostics {
  string file_path = 1;
  repeated Diagnostic diagnostics = 2;
}

message Diagnostic {
  string message = 1;
  DiagnosticRange range = 2;
  DiagnosticSeverity severity = 3;
  optional string source = 4;
}

message DiagnosticRange {
  DiagnosticPosition start = 1;
  DiagnosticPosition end = 2;
}

message DiagnosticPosition {
  int32 line = 1;
  int32 character = 2;
}

enum DiagnosticSeverity {
  DIAGNOSTIC_ERROR = 0;
  DIAGNOSTIC_WARNING = 1;
  DIAGNOSTIC_INFORMATION = 2;
  DIAGNOSTIC_HINT = 3;
}

// API Provider enumeration
enum ApiProvider {
  ANTHROPIC = 0;
  OPENROUTER = 1;
  BEDROCK = 2;
  VERTEX = 3;
  OPENAI = 4;
  OLLAMA = 5;
  LMSTUDIO = 6;
  GEMINI = 7;
  OPENAI_NATIVE = 8;
  TOGETHER = 10;
  DEEPSEEK = 11;
  QWEN = 12;
  DOUBAO = 13;
  MISTRAL = 14;
  VSCODE_LM = 15;
  LITELLM = 17;
  NEBIUS = 18;
  FIREWORKS = 19;
  ASKSAGE = 20;
  XAI = 21;
  SAMBANOVA = 22;
  CEREBRAS = 23;
  GROQ = 24;
  SAPAICORE = 25;
  CLAUDE_CODE = 26;
  MOONSHOT = 27;
  HUGGINGFACE = 28;
  HUAWEI_CLOUD_MAAS = 29;
  BASETEN = 30;
  ZAI = 31;
  VERCEL_AI_GATEWAY = 32;
  QWEN_CODE = 33;
  DIFY = 34;
  OCA = 35;
  MINIMAX = 36;
  HICAP = 37;
  NOUSRESEARCH = 39;
  OPENAI_CODEX = 40;
  CLOUDFLARE = 41;
}

enum ApiFormat {
  ANTHROPIC_CHAT = 0;
  GEMINI_CHAT = 1;
  OPENAI_CHAT = 2;
  R1_CHAT = 3;
  OPENAI_RESPONSES = 4;
  OPENAI_RESPONSES_WEBSOCKET_MODE = 5;
}
