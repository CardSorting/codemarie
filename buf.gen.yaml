version: v2
managed:
  enabled: true
plugins:
  - local: node_modules/.bin/protoc-gen-ts_proto
    out: src/shared/proto
    strategy: all
    opt:
      - env=both
      - esModuleInterop=true
      - outputServices=generic-definitions
      - outputIndex=true
      - useOptionals=none
      - useDate=false
inputs:
  - directory: proto
